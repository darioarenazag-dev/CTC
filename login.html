<!DOCTYPE html>
<html lang="es" data-tema="claro">

<head>
    <meta charset="UTF-8">
    <title>Acceder - ControlaTusCuentas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body class="pagina-auth">
    <div class="auth-tema-btn">
        <div id="tema-slot"></div>
    </div>
    <main id="app"></main>
    <script type="module">
        import { AuthController } from './src/controllers/AuthController.js';
        import { DomManager } from './src/dom/DomManager.js';
        import { inicializarTema } from './src/utils/ThemeManager.js';
        document.getElementById('tema-slot').innerHTML = DomManager.htmlBtnTema();
        inicializarTema(document.getElementById('btn-tema'));
        const controller = new AuthController(document.getElementById('app'));
        controller.iniciar();
    </script>
</body>

</html>
